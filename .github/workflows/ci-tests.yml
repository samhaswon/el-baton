name: CI Tests

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck-and-unit:
    name: Typecheck + Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: ./node_modules/.bin/tsc --noEmit

      - name: Run unit tests
        run: npm run -s test

  ui-smoke:
    name: UI Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: typecheck-and-unit

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run UI tests (Xvfb)
        run: xvfb-run -a npm run -s test:ui
