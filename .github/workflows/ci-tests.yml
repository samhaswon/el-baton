name: CI Tests

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - dev

permissions:
  contents: read

concurrency:
  group: ci-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck-and-unit:
    name: Typecheck + Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: ./node_modules/.bin/tsc --noEmit

      - name: Run unit tests
        run: npm run -s test

  ui-smoke:
    name: UI Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: typecheck-and-unit

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            inkscape \
            xvfb \
            xauth \
            libasound2 \
            libatk-bridge2.0-0 \
            libatk1.0-0 \
            libcups2 \
            libdrm2 \
            libgbm1 \
            libgtk-3-0 \
            libnspr4 \
            libnss3 \
            libx11-xcb1 \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libxkbcommon0 \
            libxrandr2 \
            libxss1 \
            libxtst6

      - name: Run UI tests (Xvfb)
        env:
          ELECTRON_DISABLE_SANDBOX: "1"
          LIBGL_ALWAYS_SOFTWARE: "1"
          ELECTRON_ENABLE_LOGGING: "1"
          ELECTRON_ENABLE_STACK_DUMPING: "1"
          DEBUG: "pw:browser*"
        run: xvfb-run -a --server-args="-screen 0 1365x720x24" npm run -s test:ui
