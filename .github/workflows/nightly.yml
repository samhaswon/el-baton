name: Nightly Publish

on:
  push:
    tags:
      - "nightly-*"

permissions:
  contents: write

concurrency:
  group: nightly-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  cleanup_release:
    name: Cleanup Existing Nightly Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Delete existing release for this nightly tag (if any)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release delete "$TAG_NAME" --repo "$GITHUB_REPOSITORY" --yes
          else
            echo "No existing release found for tag $TAG_NAME"
          fi

  publish:
    needs: cleanup_release
    name: Publish Nightly ${{ matrix.os }} / ${{ matrix.arch }}
    runs-on: ${{ matrix.runs_on }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: x64
            runs_on: ubuntu-latest
            builder_args: --linux AppImage deb rpm pacman --x64
          - os: linux
            arch: arm64
            runs_on: ubuntu-24.04-arm
            builder_args: --linux AppImage deb rpm pacman --arm64
          - os: windows
            arch: x64
            runs_on: windows-latest
            builder_args: --win --x64
          - os: windows
            arch: arm64
            runs_on: windows-11-arm
            builder_args: --win --arm64
          - os: macos
            arch: x64
            runs_on: macos-15-intel
            builder_args: --mac --x64
          - os: macos
            arch: arm64
            runs_on: macos-14
            builder_args: --mac --arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          architecture: ${{ matrix.os == 'windows' && matrix.arch == 'arm64' && 'x64' || matrix.arch }}
          cache: npm

      - name: Setup Python
        if: matrix.os == 'windows'
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          architecture: ${{ matrix.arch == 'arm64' && 'arm64' || 'x64' }}

      - name: Prepare Windows Python for node-gyp
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          python -m pip install --upgrade pip setuptools wheel

      - name: Install dependencies
        env:
          npm_config_python: ${{ matrix.os == 'windows' && 'python' || '' }}
        run: npm ci

      - name: Install Linux build dependencies
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y inkscape imagemagick libarchive-tools

      - name: Install macOS build dependencies
        if: matrix.os == 'macos'
        run: brew install inkscape imagemagick

      - name: Install Windows build dependencies
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          choco install inkscape imagemagick --no-progress -y
          $magick = Get-Command magick -ErrorAction SilentlyContinue
          if ($magick) {
            Split-Path $magick.Source | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          }

      - name: Compile release bundle
        env:
          EL_BATON_SKIP_ICON_REGEN: ${{ matrix.os == 'windows' && '1' || '0' }}
          EL_BATON_SKIP_ICON_FONT_BUILD: ${{ matrix.os == 'windows' && '1' || '0' }}
        run: npm run -s compile:release

      - name: Patch peer ranges
        run: npm run -s script:build:patch-peers

      - name: Publish nightly artifacts to GitHub (prerelease)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          CSC_FOR_PULL_REQUEST: "false"
          npm_config_python: ${{ matrix.os == 'windows' && 'python' || '' }}
        run: npx electron-builder ${{ matrix.builder_args }} --publish always --config.publish.releaseType=prerelease
