name: CI Build Matrix

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - dev

permissions:
  contents: read

concurrency:
  group: ci-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.os }} / ${{ matrix.arch }}
    runs-on: ${{ matrix.runs_on }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: x64
            runs_on: ubuntu-latest
            build_script: build:linux:ci:full
          - os: linux
            arch: arm64
            runs_on: ubuntu-24.04-arm
            build_script: build:linux:arm64:ci:full
          - os: windows
            arch: x64
            runs_on: windows-latest
            build_script: build:win
          - os: windows
            arch: arm64
            runs_on: windows-11-arm
            build_script: build:win:arm64
          - os: macos
            arch: x64
            runs_on: macos-15-intel
            build_script: build:mac:x64
          - os: macos
            arch: arm64
            runs_on: macos-14
            build_script: build:mac:arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          architecture: ${{ matrix.os == 'windows' && matrix.arch == 'arm64' && 'x64' || matrix.arch }}
          cache: npm

      - name: Setup Python
        if: matrix.os == 'windows'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: ${{ matrix.arch == 'arm64' && 'arm64' || 'x64' }}

      - name: Prepare Windows Python for node-gyp
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          python -m pip install --upgrade pip setuptools wheel

      - name: Install dependencies
        env:
          npm_config_python: ${{ matrix.os == 'windows' && 'python' || '' }}
        run: npm ci

      - name: Install Linux build dependencies
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y inkscape imagemagick libarchive-tools

      - name: Install Linux snapcraft (x64 only)
        if: matrix.os == 'linux' && matrix.arch == 'x64'
        run: |
          sudo apt-get update
          sudo apt-get install -y snapd
          sudo systemctl start snapd || true
          sudo snap install snapcraft --classic
          echo "/snap/bin" >> "$GITHUB_PATH"

      - name: Install macOS build dependencies
        if: matrix.os == 'macos'
        run: brew install inkscape imagemagick

      - name: Install Windows build dependencies
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          choco install inkscape imagemagick --no-progress -y
          $magick = Get-Command magick -ErrorAction SilentlyContinue
          if ($magick) {
            Split-Path $magick.Source | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          }

      - name: Build
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          CSC_FOR_PULL_REQUEST: "true"
          GH_TOKEN: ""
          EL_BATON_SKIP_ICON_REGEN: ${{ matrix.os == 'windows' && '1' || '0' }}
          EL_BATON_SKIP_ICON_FONT_BUILD: ${{ matrix.os == 'windows' && '1' || '0' }}
          npm_config_python: ${{ matrix.os == 'windows' && 'python' || '' }}
        run: npm run -s ${{ matrix.build_script }}

      - name: Upload build artifacts
        if: github.event_name == 'push' && (github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}-${{ matrix.arch }}
          path: releases/**
          if-no-files-found: error
